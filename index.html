<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Applied Art Heritage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #cecece; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            max-width: 800px;
            width: 85%;
            background: #ffffff;
            padding: 100px 50px;
            text-align: center;
        }

        .content-logo {
            max-width: 480px;
            width: 100%;
            margin-bottom: 70px;
        }

        .text-block {
            font-size: 1rem;
            font-weight: 300;
            text-transform: uppercase; /* Kõik suured tähed */
            letter-spacing: 4px; /* Suured vahed */
            line-height: 2.2;
            color: #555;
            padding: 0 40px;
        }

        .footer-info {
            width: 100%;
            text-align: center;
            padding: 40px 0;
        }

        .social-icons {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        .icon-link { color: #333; font-size: 1.2rem; }

        .copyright {
            font-size: 0.55rem;
            color: #aaa;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="European Applied Art Heritage" class="content-logo">
        <div class="text-block">
            The mission of European Applied Art Heritage is to preserve, research, value, and internationally promote the heritage of European applied arts, with a particular focus on historical glass and ceramic art.
        </div>
    </div>
    <div class="footer-info">
        <div class="social-icons">
            <a href="mailto:eaah@eaah.eu" class="icon-link"><i class="fa-regular fa-envelope"></i></a>
            <a href="https://www.instagram.com/europeanappliedartheritage" target="_blank" class="icon-link"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <div class="copyright">© Copyright European Applied Art Heritage. All rights reserved.</div>
    </div>
</body>
</html>
