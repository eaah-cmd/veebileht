<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Applied Art Heritage</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #cecece; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }
        
        header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 50px 0 30px 0;
        }

        .header-logo {
            max-width: 300px; /* Logo suurus */
            height: auto;
        }

        .container {
            max-width: 600px;
            width: 85%;
            background: #ffffff;
            padding: 60px 45px 75px 45px;
            border-radius: 2px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            color: #000;
            margin-bottom: 55px;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .text-block {
            margin-bottom: 70px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 300;
            color: #222;
        }

        .contact {
            margin-top: 60px;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
        }

        a {
            color: #000;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
        }

        .copyright {
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            padding: 25px 0;
            margin-top: auto;
        }
    </style>
</head>
