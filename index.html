<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Applied Art Heritage</title>
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: "Georgia", "Times New Roman", serif; /* Klassikaline serif-font */
            line-height: 1.6;
            color: #333;
            background-color: #cecece; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            max-width: 750px;
            width: 85%;
            background: #ffffff;
            padding: 80px 50px;
            border-radius: 2px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }

        .content-logo {
            max-width: 480px;
            width: 100%;
            height: auto;
            margin-bottom: 60px;
        }

        .text-block {
            text-align: center;
            font-size: 1.35rem; /* Suurendatud font */
            font-style: italic; /* Kursiiv lisab kunstipärasust */
            font-weight: 400;
            line-height: 1.8;
            color: #222;
            padding: 0 20px;
        }

        .footer-info {
            width: 100%;
            text-align: center;
            padding: 30px 0;
        }

        .social-icons {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .icon-link {
            color: #444;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }

        .icon-link:hover { opacity: 0.4; }

        .copyright {
            font-size: 0.6rem;
            color: #888;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="European Applied Art Heritage" class="content-logo">
        <div class="text-block">
            The mission of European Applied Art Heritage is to preserve, research, value, and internationally promote the heritage of European applied arts, with a particular focus on historical glass and ceramic art.
        </div>
    </div>
    <div class="footer-info">
        <div class="social-icons">
            <a href="mailto:eaah@eaah.eu" class="icon-link" title="Email us"><i class="fa-regular fa-envelope"></i></a>
            <a href="https://www.instagram.com/europeanappliedartheritage" target="_blank" class="icon-link" title="Follow us"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <div class="copyright">© Copyright European Applied Art Heritage. All rights reserved.</div>
    </div>
</body>
</html>
