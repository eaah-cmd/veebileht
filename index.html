<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Applied Art Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #cecece; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            max-width: 700px;
            width: 85%;
            background: #ffffff;
            padding: 90px 60px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }

        .content-logo {
            max-width: 480px;
            width: 100%;
            margin-bottom: 50px;
        }

        .text-block {
            font-family: 'Playfair Display', serif; /* Elegantne galerii-font */
            font-size: 1.3rem; /* Märgatavalt suurem */
            line-height: 1.7;
            color: #1a1a1a;
            font-weight: 400;
        }

        .footer-info {
            width: 100%;
            text-align: center;
            padding: 30px 0;
        }

        .social-icons {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .icon-link { color: #444; font-size: 1.1rem; text-decoration: none; }

        .copyright {
            font-size: 0.6rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="European Applied Art Heritage" class="content-logo">
        <div class="text-block">
            The purpose of European Applied Art Heritage is to preserve, research, value, and internationally promote the heritage of European applied arts, with a particular focus on historical glass and ceramic art.
        </div>
    </div>
    <div class="footer-info">
        <div class="social-icons">
            <a href="mailto:eaah@eaah.eu" class="icon-link"><i class="fa-regular fa-envelope"></i></a>
            <a href="https://www.instagram.com/europeanappliedartheritage" target="_blank" class="icon-link"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <div class="copyright">© Copyright European Applied Art Heritage. All rights reserved.</div>
    </div>
</body>
</html>
