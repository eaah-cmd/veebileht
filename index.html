<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Applied Art Heritage</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #cecece; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        .container {
            max-width: 600px;
            width: 85%;
            background: #ffffff;
            padding: 60px 45px 75px 45px;
            border-radius: 2px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1;
        }

        /* Logo tekstilise pealkirja asemele */
        .content-logo {
            max-width: 240px; /* Saad siit logo suurust reguleerida */
            height: auto;
            margin-bottom: 50px;
            display: inline-block;
        }

        .text-block {
            margin-bottom: 70px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 300;
            color: #222;
        }

        .contact {
            margin-top: 60px;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
        }

        a {
            color: #000;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
            transition: all 0.3s ease;
        }

        a:hover {
            border-bottom-color: #000;
        }

        .copyright {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 0.8px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="European Applied Art Heritage" class="content-logo">
        
        <div class="text-block">
            The mission of European Applied Art Heritage is to preserve, research, value, and internationally promote the heritage of European applied arts, with a particular focus on historical glass and ceramic art.
        </div>

        <div class="contact">
            <a href="mailto:eaah@eaah.eu">eaah@eaah.eu</a>
        </div>
    </div>

    <div class="copyright">
        © Copyright European Applied Art Heritage. All rights reserved.
    </div>

</body>
</html>
