<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Applied Art Heritage</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #cecece; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        .container {
            max-width: 650px; /* Veidi laiem, et suurem logo mahuks paremini */
            width: 85%;
            background: #ffffff;
            padding: 80px 50px;
            border-radius: 2px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1;
        }

        /* Logo on nüüd märgatavalt suurem */
        .content-logo {
            max-width: 380px; /* Suurendatud 240px pealt 380px peale */
            width: 100%;
            height: auto;
            margin-bottom: 60px;
            display: inline-block;
        }

        .text-block {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 300;
            color: #222;
            margin-bottom: 0; /* Eemaldame liigse tühimiku kasti alt */
        }

        /* Uus minimalistlik kontaktiosa lehe allosas */
        .footer-info {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 1;
        }

        .footer-email {
            display: block;
            margin-bottom: 15px;
            font-size: 0.95rem;
            letter-spacing: 2px;
            color: #333;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .footer-email:hover {
            opacity: 0.6;
        }

        .copyright {
            font-size: 0.7rem;
            color: #777;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="European Applied Art Heritage" class="content-logo">
        
        <div class="text-block">
            The mission of European Applied Art Heritage is to preserve, research, value, and internationally promote the heritage of European applied arts, with a particular focus on historical glass and ceramic art.
        </div>
    </div>

    <div class="footer-info">
        <a href="mailto:eaah@eaah.eu" class="footer-email">eaah@eaah.eu</a>
        <div class="copyright">
            © Copyright European Applied Art Heritage. All rights reserved.
        </div>
    </div>

</body>
</html>
